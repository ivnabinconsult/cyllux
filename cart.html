<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CYLLUX HOMES — Shopping Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="themes.js"></script>
  <script src="mobile-nav.js"></script>
</head>
<body>
  <nav id="main-nav">
    <div class="nav-logo" onclick="window.location.href='index.html'">
      <div class="logo-mark">CX</div>
      CYLLUX
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Catalog</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <span class="theme-label" id="theme-label">Dark</span>
      <div class="theme-toggle" id="themeToggle" onclick="toggleTheme()"></div>
      <button class="nav-icon-btn" onclick="window.location.href='login.html'">👤</button>
      <button class="nav-icon-btn" onclick="window.location.href='cart.html'">
        🛒
        <span class="cart-badge" id="cart-badge">0</span>
      </button>
    </div>
      <button class="hamburger" id="hamburger" aria-label="Menu" onclick="toggleMobileNav()">
        <span></span><span></span><span></span>
      </button>
  </nav>

  <main>
    <div class="cart-layout">
      <div class="cart-items-area">
        <div class="section-label">Your Bag</div>
        <h1 class="section-title">Shopping <span class="crimson-slash">Cart</span></h1>
        <div id="cart-items-container"></div>
      </div>
      <div class="cart-summary-area">
        <div class="summary-title" style="font-weight: 700; margin-bottom: 24px;">Order Summary</div>
        <div class="summary-line"><span>Subtotal</span><span id="summary-subtotal">₦0</span></div>
        <div class="summary-line"><span>VAT (7.5%)</span><span id="summary-vat">₦0</span></div>
        <div class="summary-total"><span>Total</span><span id="summary-total">₦0</span></div>
        <button class="btn-primary checkout-btn" style="width: 100%; justify-content: center; margin-top: 24px;" onclick="window.location.href='checkout.html'">Proceed to Checkout →</button>
        <div style="text-align:center; margin-top: 16px;"><a href="products.html" style="color: var(--text-muted);">Continue Shopping</a></div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"><div id="toast-msg"></div></div>
  <div id="pf-launcher" onclick="pfToggle()"><svg viewBox="0 0 24 24" width="26" height="26" fill="white"><path d="M20 2H4a2 2 0 0 0-2 2v18l4-4h14a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2z"/></svg></div>
  <div id="pf-window"><div class="pf-header"><span>🏠 Cyllux Assistant</span></div><div class="pf-messages" id="pf-messages"></div><div class="pf-input-row"><textarea id="pf-input" placeholder="Ask about design..." rows="1"></textarea><button id="pf-send" onclick="pfSend()">➤</button></div></div>

  <script src="data.js"></script>
  <script src="cart.js"></script>
  <script src="chatbot.js"></script>
  <script src="theme.js"></script>
  <script src="cart-page.js"></script>
</body>
</html>
